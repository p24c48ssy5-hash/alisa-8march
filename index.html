<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Алиса ❤️</title>

<style>
  <style>
#screen3 {
    text-align: center;
}

#screen3 img {
    width: 200px;        /* размер фоток */
    height: 200px;
    object-fit: cover;   /* чтобы красиво обрезались */
    border-radius: 15px;
    margin: 10px;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
}

.gallery {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(180deg, #ff4d6d, #ff99ac);
  color:white;
  text-align:center;
  overflow:hidden;
}

.screen {
  display:none;
  padding:20px;
  animation: fade 0.5s ease;
}
.active { display:block; }

@keyframes fade {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}

.card {
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  margin:10px;
  padding:15px;
  border-radius:20px;
  cursor:pointer;
}

button {
  margin-top:20px;
  padding:14px 22px;
  background:white;
  color:#ff4d6d;
  border:none;
  border-radius:30px;
  font-weight:bold;
}

.hidden { display:none; }

.grid {
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  gap:10px;
  max-width:320px;
  margin:20px auto;
}

.game-card {
  background:white;
  color:#ff4d6d;
  padding:20px;
  border-radius:15px;
  font-size:20px;
}

.matched { background:lightgreen; }

/* сердечки */
.heart {
  position: fixed;
  bottom: -10px;
  font-size: 20px;
  animation: float 6s linear infinite;
}
@keyframes float {
  0% {transform:translateY(0); opacity:1;}
  100% {transform:translateY(-100vh); opacity:0;}
}

/* печатающийся текст */
.typing {
  border-right: 2px solid white;
  display:inline-block;
  white-space: nowrap;
  overflow:hidden;
}
</style>
</head>

<body>

<!-- старт -->
<div id="start" class="screen active">
<h1>💖 Нажми, Алиса</h1>
<button onclick="startApp()">Открыть</button>
</div>

<!-- экран 1 -->
<div id="screen1" class="screen">
<h1>💖 Алиса, почему я тебя люблю</h1>

<div class="card" onclick="toggle(this)">
Твоя нежность
<p class="hidden">Ты делаешь мою жизнь лучше</p>
</div>

<div class="card" onclick="toggle(this)">
Твой смех
<p class="hidden">Он делает меня счастливым</p>
</div>

<div class="card" onclick="toggle(this)">
Ты
<p class="hidden">Просто потому что ты — это ты</p>
</div>

<button onclick="next(2)">Далее →</button>
</div>

<!-- игра -->
<div id="screen2" class="screen">
<h1>🎮 Найди пары</h1>
<div class="grid" id="game"></div>
<button onclick="next(3)">Далее →</button>
</div>

<!-- фото -->
<div id="screen3" class="screen">
<h1>📸 Наши моменты</h1>

<div class="gallery">
    <img src="img/1.jpg">
    <img src="img/2.jpg">
    <img src="img/3.jpg">
    <img src="img/4.jpg">
    <img src="img/5.jpg">
    <img src="img/6.jpg">
    <img src="img/7.jpg">
</div>

<br>
<button onclick="next(4)">Далее →</button>
</div>

<!-- финал -->
<div id="screen4" class="screen">
<h1>🌸 с 8 марта, любимая!</h1>

<p id="text" class="typing"></p>

<br><br>

<a href="https://example.com" target="_blank">
<button>🎁 Твой подарок</button>
</a>

</div>

<!-- музыка -->
<audio id="music" loop>
<source src="https://rus.hitmotop.com/song/47842917">
</audio>

<script>

// запуск (важно для телефона)
function startApp(){
  document.getElementById("start").classList.remove("active");
  document.getElementById("screen1").classList.add("active");
  document.getElementById("music").play();
}

// переключение экранов
function next(n){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("screen"+n).classList.add("active");

  if(n===4) typeText();
}

// раскрытие
function toggle(el){
  el.querySelector("p").classList.toggle("hidden");
}

// сердечки
setInterval(()=>{
  let h=document.createElement("div");
  h.className="heart";
  h.innerHTML="💖";
  h.style.left=Math.random()*100+"%";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},300);

// печатающийся текст
let message = "Ты — самое лучшее, что есть в моей жизни. Я безумно тебя люблю ❤️";
let i=0;

function typeText(){
  let el=document.getElementById("text");
  el.innerHTML="";
  i=0;

  let interval=setInterval(()=>{
    el.innerHTML += message[i];
    i++;
    if(i>=message.length) clearInterval(interval);
  },40);
}

// игра
let icons = ["💖","🌹","🎀","🧸","💖","🌹","🎀","🧸"];
icons.sort(()=>0.5-Math.random());

let first=null;
let lock=false;
const game=document.getElementById("game");

icons.forEach(icon=>{
  let div=document.createElement("div");
  div.className="game-card";
  div.innerHTML="❓";

  div.onclick=()=>{
    if(lock || div.innerHTML!=="❓") return;

    div.innerHTML=icon;

    if(!first){
      first=div;
    } else {
      lock=true;
      setTimeout(()=>{
        if(first.innerHTML===div.innerHTML){
          first.classList.add("matched");
          div.classList.add("matched");
        } else {
          first.innerHTML="❓";
          div.innerHTML="❓";
        }
        first=null;
        lock=false;
      },500);
    }
  }

  game.appendChild(div);
});

</script>

</body>
</html>
